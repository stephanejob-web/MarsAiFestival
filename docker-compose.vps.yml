services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.vps
    environment:
      - VITE_API_URL=
      - VITE_LIVEKIT_URL=wss://marai-1fs2judn.livekit.cloud
      - BACKEND_URL=http://backend:5500
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - marsai-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marsai.rule=Host(`marsai.lightchurch.fr`)"
      - "traefik.http.routers.marsai.entrypoints=websecure"
      - "traefik.http.routers.marsai.tls.certresolver=letsencrypt"
      - "traefik.http.services.marsai.loadbalancer.server.port=5173"
      - "traefik.http.services.marsai.loadbalancer.server.scheme=https"
      - "traefik.http.serversTransports.marsai-transport.insecureSkipVerify=true"
      - "traefik.http.services.marsai.loadbalancer.serverstransport=marsai-transport"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.vps
    expose:
      - "5500"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=marsai
      - DB_USER=root
      - DB_PASSWORD=marsai_dev_2026
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marsai-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marsai-api.rule=Host(`marsai.lightchurch.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.marsai-api.entrypoints=websecure"
      - "traefik.http.routers.marsai-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.marsai-api.loadbalancer.server.port=5500"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: marsai_dev_2026
      MYSQL_DATABASE: marsai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - marsai-network

networks:
  marsai-network:
    driver: bridge
  traefik-network:
    external: true

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
