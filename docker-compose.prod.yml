services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
      args:
        - VITE_GOOGLE_CLIENT_ID=772416103398-0cif2a7lj8j6agcp49g2ab14fh7so8ep.apps.googleusercontent.com
        - VITE_LIVEKIT_URL=wss://marai-1fs2judn.livekit.cloud
    container_name: marsai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - marsai-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marsai.rule=Host(`marsai.lightchurch.fr`)"
      - "traefik.http.routers.marsai.entrypoints=websecure"
      - "traefik.http.routers.marsai.tls.certresolver=letsencrypt"
      - "traefik.http.services.marsai.loadbalancer.server.port=80"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    container_name: marsai-backend
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=marsai
      - DB_USER=root
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - marsai-network

  # ───────────────────────────────────────────
  # MinIO — stockage objet S3-compatible (remplace Scaleway)
  # ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: marsai-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - marsai-network

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - marsai-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/marsai &&
      mc anonymous set download local/marsai
      "

  mysql:
    image: mysql:8.0
    container_name: marsai-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    env_file:
      - .env.vps
    environment:
      MYSQL_DATABASE: marsai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - marsai-network

volumes:
  mysql-data:
  minio-data:
  backend-uploads:

networks:
  marsai-network:
    driver: bridge
  traefik-network:
    external: true
