services:
  # ───────────────────────────────────────────
  # Frontend — React + Vite (HMR)
  # ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      # Bind mount : ton code local est synchronisé en temps réel
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      # Volume nommé : node_modules installés dans l'image, jamais écrasés
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=
      - VITE_LIVEKIT_URL=wss://marai-1fs2judn.livekit.cloud
      - BACKEND_URL=http://backend:5500
      - VITE_GOOGLE_CLIENT_ID=772416103398-dld2t8lk6amda0ohsansm31udg3oc9ia.apps.googleusercontent.com
    depends_on:
      backend:
        condition: service_started

  # ───────────────────────────────────────────
  # Backend — Express + ts-node-dev (auto-restart)
  # ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "5500:5500"
    volumes:
      # Bind mount : ton code local est synchronisé en temps réel
      - ./backend/src:/app/src
      - ./backend/tsconfig.json:/app/tsconfig.json
      # Uploads persistés entre les redémarrages
      - ./backend/uploads:/app/uploads
      # Volume nommé : node_modules installés dans l'image, jamais écrasés
      - backend_node_modules:/app/node_modules
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=marsai
      - DB_USER=root
      - DB_PASSWORD=marsai_dev_2026
      - SCALEWAY_ACCESS_KEY=SCW3MFQBR803FXZS4N33
      - SCALEWAY_SECRET_KEY=c64db8bf-f541-478d-aa6a-cbcb8c7be2ae
      - SCALEWAY_ENDPOINT=https://s3.fr-par.scw.cloud
      - SCALEWAY_BUCKET_NAME=tln
      - SCALEWAY_REGION=fr-par
      - SCALEWAY_FOLDER=grp1
      - JWT_SECRET=mars-ai-dev-secret-2026
    depends_on:
      mysql:
        condition: service_healthy

  # ───────────────────────────────────────────
  # MySQL 8 — chargement automatique de marsai_backup.sql
  # ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: marsai_dev_2026
      MYSQL_DATABASE: marsai
    volumes:
      # Volume persistant : les données survivent aux redémarrages
      - mysql_data:/var/lib/mysql
      # Init SQL : chargé automatiquement au 1er démarrage (tables + données)
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
