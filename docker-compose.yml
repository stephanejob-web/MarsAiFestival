services:
  # ───────────────────────────────────────────
  # Frontend — React + Vite (HMR)
  # ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      # Bind mount : ton code local est synchronisé en temps réel
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      # Volume nommé : node_modules installés dans l'image, jamais écrasés
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=
      - VITE_LIVEKIT_URL=wss://marai-1fs2judn.livekit.cloud
      - BACKEND_URL=http://backend:5500
      - VITE_GOOGLE_CLIENT_ID=772416103398-dld2t8lk6amda0ohsansm31udg3oc9ia.apps.googleusercontent.com
    depends_on:
      backend:
        condition: service_started

  # ───────────────────────────────────────────
  # Backend — Express + ts-node-dev (auto-restart)
  # ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "5500:5500"
    volumes:
      # Bind mount : ton code local est synchronisé en temps réel
      - ./backend/src:/app/src
      - ./backend/tsconfig.json:/app/tsconfig.json
      # Uploads persistés entre les redémarrages
      - ./backend/uploads:/app/uploads
      # Volume nommé : node_modules installés dans l'image, jamais écrasés
      - backend_node_modules:/app/node_modules
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=marsai
      - DB_USER=root
      - DB_PASSWORD=marsai_dev_2026
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_URL=http://localhost:9100
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=marsai
      - MINIO_REGION=us-east-1
      - MINIO_FOLDER=grp1
      - JWT_SECRET=mars-ai-dev-secret-2026
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ───────────────────────────────────────────
  # MinIO — stockage objet S3-compatible (remplace Scaleway)
  # Console : http://localhost:9001  (admin / minioadmin)
  # API S3  : http://localhost:9000
  # ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Crée le bucket "marsai" au premier démarrage
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/marsai &&
      mc anonymous set download local/marsai
      "

  # ───────────────────────────────────────────
  # MySQL 8 — chargement automatique de marsai_backup.sql
  # ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: marsai_dev_2026
      MYSQL_DATABASE: marsai
    volumes:
      # Volume persistant : les données survivent aux redémarrages
      - mysql_data:/var/lib/mysql
      # Init SQL : chargé automatiquement au 1er démarrage (tables + données)
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ───────────────────────────────────────────
  # Grafana — dashboard monitoring
  # ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=marsai_grafana_2026
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  minio_data:
  backend_node_modules:
  frontend_node_modules:
  grafana_data:
