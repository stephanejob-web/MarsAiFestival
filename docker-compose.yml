services:
  # ───────────────────────────────────────────
  # Frontend — React + Vite (HMR)
  # ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      # Bind mount : ton code local est synchronisé en temps réel
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      # Volume nommé : node_modules installés dans l'image, jamais écrasés
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5500
    depends_on:
      - backend

  # ───────────────────────────────────────────
  # Backend — Express + ts-node-dev (auto-restart)
  # ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "5500:5500"
    volumes:
      # Bind mount : ton code local est synchronisé en temps réel
      - ./backend/src:/app/src
      - ./backend/tsconfig.json:/app/tsconfig.json
      # Volume nommé : node_modules installés dans l'image, jamais écrasés
      - backend_node_modules:/app/node_modules
    env_file:
      - ./backend/.env
    environment:
      # Ces 3 variables écrasent le .env pour pointer vers le MySQL Docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=marsai
    depends_on:
      mysql:
        condition: service_healthy

  # ───────────────────────────────────────────
  # MySQL 8 — chargement automatique de marsai_backup.sql
  # ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: marsai_dev_2026
      MYSQL_DATABASE: marsai
    volumes:
      # Volume persistant : les données survivent aux redémarrages
      - mysql_data:/var/lib/mysql
      # Init SQL : chargé automatiquement au 1er démarrage
      - ./marsai_backup.sql:/docker-entrypoint-initdb.d/marsai_backup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
